<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main id="login-container">
        <section id="image-container">
            <img src="washing-machine.png" alt="Washing Machine">
        </section>

        <section id="form-container">
            <h2>Hello Again!</h2>
            <p class="subheading">Welcome back! we missed you!</p>
            <form action="">
                <label for="email">Email</label>
                <input type="email" name="" id="email" placeholder="Email">
                <label for="password" style="margin-top: 30px;">Password</label>
                <input type="password" name="" id="password" placeholder="Password">
                <a href="">Forget Password</a>
                <button>Login</button>
            </form>
            <p class="register-link">Not a member? <a href="">Register Now</a></p>
        </section>
    </main>
</body>
</html>
